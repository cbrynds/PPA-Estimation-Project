project_root: .
synthesis_root: synthesis

apptainer_image: Open-EDA-Flow/eda-flow.sif

flow_mode: full
die_area: "0 0 800 800"
core_area: "10 10 790 790"

default_clock_port: clk
default_clock_period_ns: 3.0

sweep_mode: bounded_cartesian
sweep:
  abc_fast: [true]
  clock_period_ns: [0.5, 1.0, 2.0, 3.0, 4.0]
  max_fanout: [8, 16, 32, 64]
  max_transition_ns: [0.16, 0.20, 0.24]
  max_capacitance_ff: [40.0, 60.0, 80.0]
  fanout_load: [1.0, 2.0, 4.0]

ast:
  proc: true
  flatten: true
  dump_ast: true

output:
  csv_path: synthesis/results/ground_truth_qor_dataset.csv
  runs_dir: synthesis/runs
  ast_dir: synthesis/results/ast
  ast_log_dir: synthesis/results/ast_logs
  result_shards_dir: synthesis/results/result_shards

designs:
  # Paper-motivated training subset derived from overlap/near-overlap analysis.
  - name: ac97_ctrl
    id: iwls05_0001
    rtl_dir: hdl-benchmarks/iwls05/opencores/rtl/ac97_ctrl
    top: ac97_top
    clock_port: clk_i
    recursive: true
    extensions: [".v"]
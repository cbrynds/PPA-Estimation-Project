project_root: .
synthesis_root: synthesis

apptainer_image: Open-EDA-Flow/eda-flow.sif

flow_mode: fast
die_area: "0 0 800 800"
core_area: "10 10 790 790"

default_clock_port: clk
default_clock_period_ns: 3.0

ast:
  proc: true
  flatten: true
  dump_ast: true

output:
  csv_path: synthesis/results/ground_truth_qor_dataset.csv
  runs_dir: synthesis/runs
  ast_dir: synthesis/results/ast
  ast_log_dir: synthesis/results/ast_logs

recipes:
  - id: abc_fast
    abc_fast: true
    abc_extra: ""
    clock_period_ns: 3.0
    max_fanout: 16
    max_transition_ns: 0.20
    max_capacitance_ff: 60.0
    limit_sizing_leakage: 2.0
    high_fanout_net_threshold: 64
    fanout_load: 4.0
  - id: abc_full
    abc_fast: false
    abc_extra: ""
    clock_period_ns: 3.0
    max_fanout: 16
    max_transition_ns: 0.20
    max_capacitance_ff: 60.0
    limit_sizing_leakage: 2.0
    high_fanout_net_threshold: 64
    fanout_load: 4.0

designs:
  - name: ac97_ctrl
    id: iwls05_0001
    rtl_dir: hdl-benchmarks/iwls05/opencores/rtl/ac97_ctrl
    top: ac97_top
    clock_port: clk_i
    recursive: true
    extensions: [".v"]

project_root: .
synthesis_root: synthesis

apptainer_image: Open-EDA-Flow/eda-flow.sif

# full: includes routing + extraction (slower, closer to routed metrics)
# fast: stops post-placement, faster but less accurate
flow_mode: full
die_area: "0 0 800 800"
core_area: "10 10 790 790"

default_clock_port: clk
default_clock_period_ns: 3.0

sweep_mode: bounded_cartesian
sweep:
  clock_period_ns: [0.25, 0.5, 1.0, 2.0, 3.0]
  max_fanout: [8, 16, 32, 64]
  max_transition_ns: [0.16, 0.20, 0.24]
  max_capacitance_ff: [40.0, 60.0, 80.0]

ast:
  proc: true
  flatten: true
  dump_ast: true

output:
  csv_path: synthesis/iscas_results/iscas_ground_truth_qor_dataset.csv
  runs_dir: synthesis/iscas_runs
  ast_dir: synthesis/iscas_results/ast
  ast_log_dir: synthesis/iscas_results/ast_logs
  result_shards_dir: synthesis/iscas_results/result_shards

